<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitBot</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var t = localStorage.getItem("theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
      else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <div class="app-layout">
    <header>
      <div class="header-top">
        <div>
          <h1>PitBot</h1>
          <p class="subtitle">자작자동차 규정 및 Q&A 챗봇</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="auth-area"></div>
          <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌙</button>
        </div>
      </div>
    </header>

    <div class="content-area">
      <aside id="sidebar" class="sidebar">
        <button id="new-chat-btn" class="new-chat-btn">+ 새 대화</button>
        <div id="session-list" class="session-list"></div>
      </aside>

      <div class="main">
        <div class="chat-wrapper">
          <div id="chat" class="chat"></div>
          <div id="login-overlay" class="login-overlay hidden">
            <div class="overlay-content">
              <p>질문하려면 로그인이 필요합니다</p>
              <a href="/api/auth/login" class="login-btn google-login">Google로 로그인</a>
            </div>
          </div>
        </div>

        <form id="form" class="input-area">
          <div class="collection-selector">
            <label class="collection-chip">
              <input type="checkbox" name="collections" value="qna" checked>
              <span>Q&amp;A</span>
            </label>
            <label class="collection-chip">
              <input type="checkbox" name="collections" value="rules" checked>
              <span>규정</span>
            </label>
          </div>
          <input
            id="query"
            type="text"
            placeholder="질문을 입력하세요..."
            autocomplete="off"
            required
          >
          <button type="submit" id="send">전송</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
