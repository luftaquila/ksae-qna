<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitBot</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var t = localStorage.getItem("theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
      else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <div class="app-layout">
    <header>
      <div class="header-top">
        <div style="display:flex;align-items:center;gap:10px;">
          <button id="sidebar-toggle" class="sidebar-toggle" aria-label="메뉴">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <a href="/" class="header-brand">
            <img src="/static/logo.svg" alt="PitBot" class="header-logo">
            <h1>PitBot</h1>
          </a>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="auth-area"></div>
          <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌙</button>
        </div>
      </div>
    </header>

    <div class="content-area">
      <aside id="sidebar" class="sidebar">
        <button id="new-chat-btn" class="new-chat-btn">+ 새 대화</button>
        <div id="session-list" class="session-list"></div>
      </aside>
      <div id="sidebar-overlay" class="sidebar-overlay"></div>

      <div class="main">
        <div class="chat-wrapper">
          <div id="chat" class="chat"></div>
        </div>

        <form id="form" class="input-area">
          <div class="collection-selector">
            <select id="model-select" class="model-select"></select>
            <select id="category-select" class="category-select">
              <option value="">전체</option>
              <option value="Formula">Formula</option>
              <option value="Baja">Baja</option>
              <option value="EV">EV</option>
            </select>
            <label class="collection-chip">
              <input type="checkbox" name="collections" value="qna" checked>
              <span>Q&amp;A</span>
            </label>
            <label class="collection-chip">
              <input type="checkbox" name="collections" value="rules" checked>
              <span>규정</span>
            </label>
          </div>
          <div class="input-row">
            <input
              id="query"
              type="text"
              placeholder="질문을 입력하세요..."
              autocomplete="off"
              required
            >
            <button type="submit" id="send">전송</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
