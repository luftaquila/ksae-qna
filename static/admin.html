<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitBot Admin</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var t = localStorage.getItem("theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
      else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <div class="admin-layout">
    <div class="admin-header">
      <div class="admin-header-left">
        <a href="/" class="header-brand">
          <img src="/static/logo.svg" alt="PitBot" class="header-logo">
          <h1>PitBot</h1>
        </a>
        <span class="admin-badge">Admin</span>
      </div>
      <div class="admin-header-right">
        <a href="/" class="admin-back-link">채팅으로 돌아가기</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌙</button>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="users">사용자 관리</button>
      <button class="admin-tab" data-tab="conversations">대화 기록</button>
      <button class="admin-tab" data-tab="models">모델 관리</button>
      <button class="admin-tab" data-tab="settings">설정</button>
    </div>

    <div class="admin-content">
      <!-- Users Tab -->
      <div id="tab-users" class="tab-panel active">
        <div id="usage-summary" class="usage-summary"></div>
        <div class="admin-search">
          <input type="text" id="user-search" placeholder="이름 또는 이메일로 검색...">
        </div>
        <table class="users-table">
          <thead>
            <tr>
              <th>사용자</th>
              <th>이메일</th>
              <th>크레딧</th>
              <th>API 토큰</th>
              <th>가입일</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>

      <!-- Models Tab -->
      <div id="tab-models" class="tab-panel">
        <p class="models-description">모델 활성화/비활성화 및 표시 순서를 관리합니다. 드래그하여 순서를 변경할 수 있으며, 맨 위 모델이 기본 선택됩니다.</p>
        <div id="models-grid" class="models-grid"></div>
      </div>

      <!-- Settings Tab -->
      <div id="tab-settings" class="tab-panel">
        <p class="settings-description">사이트 전역 설정을 관리합니다.</p>
        <div class="settings-form">
          <div class="settings-row">
            <label class="settings-label" for="setting-default-credits">신규 가입 기본 제공 크레딧</label>
            <div class="settings-input-group">
              <input type="number" id="setting-default-credits" min="0" max="10000" value="15">
            </div>
            <p class="settings-hint">새로 가입하는 사용자에게 자동으로 지급되는 크레딧 수</p>
          </div>
          <div class="settings-row">
            <label class="settings-label" for="setting-low-credit-threshold">크레딧 부족 경고 기준</label>
            <div class="settings-input-group">
              <input type="number" id="setting-low-credit-threshold" min="0" max="10000" value="5">
            </div>
            <p class="settings-hint">크레딧이 이 값 이하일 때 크레딧 칩이 빨간색으로 표시됩니다</p>
          </div>
        </div>
      </div>

      <!-- Conversations Tab -->
      <div id="tab-conversations" class="tab-panel">
        <div class="conversations-layout">
          <div class="conv-sidebar">
            <div class="conv-sidebar-header">
              <div class="conv-user-filter">
                <select id="conv-user-select">
                  <option value="">전체 사용자</option>
                </select>
              </div>
            </div>
            <div class="conv-session-list" id="conv-session-list"></div>
          </div>
          <div class="conv-messages" id="conv-messages">
            <div class="conv-empty">세션을 선택하세요</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
